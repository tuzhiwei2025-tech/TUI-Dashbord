<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SVG Liquid Glass Credits Card</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="scene" aria-label="SVG liquid glass card demo">
      <svg
        class="liquid-card"
        viewBox="0 0 1820 680"
        role="img"
        aria-labelledby="card-title card-desc"
      >
        <title id="card-title">累计积分收益</title>
        <desc id="card-desc">苹果液态毛玻璃风格积分收益卡片，数值为 248,500 credits。</desc>

        <defs>
          <clipPath id="glassClip">
            <rect x="60" y="36" width="1700" height="620" rx="88" ry="88" />
          </clipPath>

          <linearGradient id="glassSurface" x1="82" y1="62" x2="1718" y2="640">
            <stop offset="0" stop-color="#ffffff" stop-opacity="0.3" />
            <stop offset="0.18" stop-color="#ffffff" stop-opacity="0.08" />
            <stop offset="0.52" stop-color="#8deaf5" stop-opacity="0.13" />
            <stop offset="1" stop-color="#ffffff" stop-opacity="0.17" />
          </linearGradient>

          <linearGradient id="edgeStroke" x1="92" y1="61" x2="1740" y2="638">
            <stop offset="0" stop-color="#ffffff" stop-opacity="1" />
            <stop offset="0.16" stop-color="#ffffff" stop-opacity="0.62" />
            <stop offset="0.62" stop-color="#ffffff" stop-opacity="0.24" />
            <stop offset="1" stop-color="#ffffff" stop-opacity="0.95" />
          </linearGradient>

          <linearGradient id="innerStroke" x1="83" y1="56" x2="1738" y2="638">
            <stop offset="0" stop-color="#ffffff" stop-opacity="0.78" />
            <stop offset="0.36" stop-color="#ffffff" stop-opacity="0.14" />
            <stop offset="0.78" stop-color="#ffffff" stop-opacity="0.08" />
            <stop offset="1" stop-color="#ffffff" stop-opacity="0.48" />
          </linearGradient>

          <radialGradient id="cornerGlow" cx="0" cy="0" r="1" gradientTransform="matrix(270 0 0 210 118 90)">
            <stop offset="0" stop-color="#ffffff" stop-opacity="0.68" />
            <stop offset="0.42" stop-color="#ffffff" stop-opacity="0.22" />
            <stop offset="1" stop-color="#ffffff" stop-opacity="0" />
          </radialGradient>

          <radialGradient id="liquidBloom" cx="0" cy="0" r="1" gradientTransform="matrix(900 0 0 330 1050 316)">
            <stop offset="0" stop-color="#b8fbff" stop-opacity="0.2" />
            <stop offset="0.5" stop-color="#8de9f5" stop-opacity="0.12" />
            <stop offset="1" stop-color="#ffffff" stop-opacity="0" />
          </radialGradient>

          <filter id="softShadow" x="0" y="0" width="1820" height="680" color-interpolation-filters="sRGB">
            <feDropShadow dx="0" dy="32" stdDeviation="22" flood-color="#166181" flood-opacity="0.32" />
            <feDropShadow dx="-5" dy="-4" stdDeviation="4" flood-color="#ffffff" flood-opacity="0.48" />
          </filter>

          <filter id="liquidDistortion" x="45" y="20" width="1730" height="645" color-interpolation-filters="sRGB">
            <feTurbulence
              type="fractalNoise"
              baseFrequency="0.008 0.024"
              numOctaves="2"
              seed="8"
              result="noise"
            >
              <animate
                attributeName="baseFrequency"
                values="0.008 0.024;0.013 0.018;0.008 0.024"
                dur="10s"
                repeatCount="indefinite"
              />
            </feTurbulence>
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="10" xChannelSelector="R" yChannelSelector="G" />
          </filter>

          <filter id="edgeRefraction" x="45" y="20" width="1730" height="645" color-interpolation-filters="sRGB">
            <feTurbulence type="fractalNoise" baseFrequency="0.015 0.09" numOctaves="1" seed="12" result="edgeNoise">
              <animate
                attributeName="baseFrequency"
                values="0.015 0.09;0.028 0.062;0.015 0.09"
                dur="8s"
                repeatCount="indefinite"
              />
            </feTurbulence>
            <feDisplacementMap in="SourceGraphic" in2="edgeNoise" scale="4" xChannelSelector="R" yChannelSelector="B" />
          </filter>

          <filter id="textGlow" x="-20%" y="-40%" width="140%" height="180%">
            <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#ffffff" flood-opacity="0.28" />
          </filter>
        </defs>

        <g class="svg-card-shell">
          <rect
            x="60"
            y="36"
            width="1700"
            height="620"
            rx="88"
            ry="88"
            fill="rgba(255,255,255,0.01)"
            filter="url(#softShadow)"
          />

          <foreignObject x="60" y="36" width="1700" height="620" clip-path="url(#glassClip)">
            <div xmlns="http://www.w3.org/1999/xhtml" class="svg-backdrop"></div>
          </foreignObject>

          <g clip-path="url(#glassClip)">
            <rect
              x="60"
              y="36"
              width="1700"
              height="620"
              rx="88"
              ry="88"
              fill="url(#glassSurface)"
              filter="url(#liquidDistortion)"
            />
            <ellipse class="liquid-blob liquid-blob--a" cx="345" cy="130" rx="310" ry="118" fill="url(#cornerGlow)" />
            <ellipse class="liquid-blob liquid-blob--b" cx="1150" cy="345" rx="700" ry="260" fill="url(#liquidBloom)" />
            <path
              class="liquid-streak"
              d="M84 95 C320 59 640 75 901 82 C1190 90 1452 76 1735 58"
              fill="none"
              stroke="#fff"
              stroke-width="15"
              stroke-linecap="round"
              stroke-opacity="0.19"
              filter="url(#liquidDistortion)"
            />
            <path
              class="liquid-streak liquid-streak--lower"
              d="M87 615 C428 643 725 612 1012 623 C1296 634 1514 646 1733 612"
              fill="none"
              stroke="#fff"
              stroke-width="13"
              stroke-linecap="round"
              stroke-opacity="0.16"
              filter="url(#liquidDistortion)"
            />
          </g>

          <rect
            x="60"
            y="36"
            width="1700"
            height="620"
            rx="88"
            ry="88"
            fill="none"
            stroke="url(#edgeStroke)"
            stroke-width="3"
            vector-effect="non-scaling-stroke"
            filter="url(#edgeRefraction)"
          />
          <rect
            x="73"
            y="49"
            width="1674"
            height="594"
            rx="76"
            ry="76"
            fill="none"
            stroke="url(#innerStroke)"
            stroke-width="8"
            stroke-opacity="0.48"
            vector-effect="non-scaling-stroke"
          />
          <path
            d="M92 158 C93 93 126 67 190 61"
            fill="none"
            stroke="#ffffff"
            stroke-width="22"
            stroke-linecap="round"
            stroke-opacity="0.22"
            filter="url(#edgeRefraction)"
          />

          <g class="svg-card-copy" filter="url(#textGlow)">
            <text x="154" y="192" class="title">累计积分收益</text>
            <text x="154" y="414" class="value">248,500</text>
            <text x="805" y="436" class="credits">credits</text>
            <text x="154" y="548" class="note">.不放积分余额（小号测数据）</text>
          </g>

          <g class="svg-indicator">
            <text x="1595" y="184" class="icon-label">icon</text>
            <path
              class="ring"
              d="M1356 175 A184 184 0 1 1 1184 279"
              fill="none"
              stroke="#ffffff"
              stroke-width="18"
              stroke-linecap="butt"
            />
            <path
              class="ring ring--left-gap"
              d="M1182 278 A184 184 0 0 0 1314 548"
              fill="none"
              stroke="#ffffff"
              stroke-width="18"
              stroke-linecap="butt"
            />
          </g>
        </g>
      </svg>
    </main>
    <script src="./script.js"></script>
  </body>
</html>
